<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Single-row Piano (Complete Version)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; align-items: center; }
        .controls input[type="number"] { width: 60px; padding: 5px; text-align: center; }
        .controls button { padding: 6px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; }
        #play-btn { background-color: #e3faf2; color: #0ca678; border-color: #96f2d7; }
        #stop-btn { background-color: #fff5f5; color: #fa5252; border-color: #ffc9c9; }
        
        /* ピアノ全体のコンテナ */
        .piano-container { display: flex; position: relative; justify-content: center; margin: 0 auto; width: fit-content; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 白鍵のスタイル */
        .key { width: 45px; height: 180px; border: 1px solid #ccc; background: white; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; font-size: 11px; cursor: pointer; user-select: none; position: relative; z-index: 1; }
        .key.active { background: #ddd; }

        /* 黒鍵のスタイル（白鍵の隙間に絶対配置） */
        .key.black { width: 30px; height: 110px; background: #222; color: white; position: absolute; z-index: 2; border-radius: 0 0 4px 4px; }
        .key.black.active { background: #555; }
        
        /* 黒鍵の配置（白鍵の左端からのピクセル位置：2個・3個の塊をきれいに配置） */
        .k-cs5 { left: 40px; }  /* C#5 */
        .k-ds5 { left: 85px; }  /* D#5 */
        
        .k-fs5 { left: 175px; } /* F#5 */
        .k-gs5 { left: 220px; } /* G#5 */
        .k-as5 { left: 265px; } /* A#5 */

        .k-cs6 { left: 355px; } /* C#6 */
        .k-ds6 { left: 400px; } /* D#6 */

        .k-fs6 { left: 490px; } /* F#6 */
        .k-gs6 { left: 535px; } /* G#6 */
        .k-as6 { left: 580px; } /* A#6 */
    </style>
</head>
<body>

    <h2>Single-row Piano</h2>
    <p>白鍵: Aの列 (a s d f g h j k l ;) / 黒鍵: Wの列 (w e t y u o p [ ] /)</p>

    <div class="controls">
        <button id="play-btn">▶ Play</button>
        <button id="stop-btn">■ Stop</button>
        <label>BPM: <input type="number" id="bpm-input" value="120" min="40" max="240"></label>
        <label>音を伸ばす(サステイン): <input type="checkbox" id="sustain-check" checked></label>
    </div>

    <div class="piano-container">
        <div class="key" data-key="a" data-note="C5">A<br>C5</div>
        <div class="key" data-key="s" data-note="D5">S<br>D5</div>
        <div class="key" data-key="d" data-note="E5">D<br>E5</div>
        <div class="key" data-key="f" data-note="F5">F<br>F5</div>
        <div class="key" data-key="g" data-note="G5">G<br>G5</div>
        <div class="key" data-key="h" data-note="A5">H<br>A5</div>
        <div class="key" data-key="j" data-note="B5">J<br>B5</div>
        <div class="key" data-key="k" data-note="C6">K<br>C6</div>
        <div class="key" data-key="l" data-note="D6">L<br>D6</div>
        <div class="key" data-key=";" data-note="E6">;<br>E6</div>
        <div class="key" data-key="'" data-note="F6">'<br>F6</div>
        <div class="key" data-key="\" data-note="G6">\<br>G6</div>
        <div class="key" data-key="a_alt" data-note="A6">A6</div>
        <div class="key" data-key="b_alt" data-note="B6">B6</div>

        <div class="key black k-cs5" data-key="w" data-note="C#5">W<br>C#5</div>
        <div class="key black k-ds5" data-key="e" data-note="D#5">E<br>D#5</div>
        
        <div class="key black k-fs5" data-key="t" data-note="F#5">T<br>F#5</div>
        <div class="key black k-gs5" data-key="y" data-note="G#5">Y<br>G#5</div>
        <div class="key black k-as5" data-key="u" data-note="A#5">U<br>A#5</div>

        <div class="key black k-cs6" data-key="o" data-note="C#6">O<br>C#6</div>
        <div class="key black k-ds6" data-key="p" data-note="D#6">P<br>D#6</div>

        <div class="key black k-fs6" data-key="[" data-note="F#6">[<br>F#6</div>
        <div class="key black k-gs6" data-key="]" data-note="G#6">]<br>G#6</div>
        <div class="key black k-as6" data-key="/" data-note="A#6">/<br>A#6</div>
    </div>

    <script>
        // --- 音階と周波数 ---
        const noteFreqs = {
            "C5": 523.25, "C#5": 554.37, "D5": 587.33, "D#5": 622.25, "E5": 659.25, "F5": 698.46, "F#5": 739.99, "G5": 783.99, "G#5": 830.61, "A5": 880.00, "A#5": 932.33, "B5": 987.77,
            "C6": 1046.50, "C#6": 1108.73, "D6": 1174.66, "D#6": 1244.51, "E6": 1318.51, "F6": 1396.91, "F#6": 1479.98, "G6": 1567.98, "G#6": 1661.22, "A6": 1760.00, "A#6": 1864.66, "B6": 1975.53
        };

        let audioCtx = null;
        const activeNodes = {}; 

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // --- 音を鳴らす（手動演奏用） ---
        function playNote(note) {
            initAudio();
            if (!noteFreqs[note]) return;
            if (activeNodes[note]) stopNote(note);

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(noteFreqs[note], audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();

            activeNodes[note] = { osc, gainNode };

            const keyEl = document.querySelector(`.key[data-note="${note}"]`);
            if (keyEl) keyEl.classList.add('active');
        }

        // --- 音を止める（手動演奏・サステイン用） ---
        function stopNote(note) {
            const node = activeNodes[note];
            if (!node) return;

            const sustainOn = document.getElementById('sustain-check').checked;
            const releaseTime = sustainOn ? 1.2 : 0.1; 

            const now = audioCtx.currentTime;
            node.gainNode.gain.cancelScheduledValues(now);
            node.gainNode.gain.setValueAtTime(node.gainNode.gain.value, now);
            node.gainNode.gain.exponentialRampToValueAtTime(0.001, now + releaseTime);

            node.osc.stop(now + releaseTime);
            delete activeNodes[note];

            const keyEl = document.querySelector(`.key[data-note="${note}"]`);
            if (keyEl) keyEl.classList.remove('active');
        }

        // --- パソコンのキーボード連携 ---
        const pressedKeys = new Set();
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const key = e.key.toLowerCase();
            const keyEl = document.querySelector(`.key[data-key="${key}"]`);
            if (keyEl) {
                playNote(keyEl.getAttribute('data-note'));
                pressedKeys.add(key);
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (pressedKeys.has(key)) {
                const keyEl = document.querySelector(`.key[data-key="${key}"]`);
                if (keyEl) stopNote(keyEl.getAttribute('data-note'));
                pressedKeys.delete(key);
            }
        });

        // 画面マウス対応
        document.querySelectorAll('.key').forEach(keyEl => {
            const note = keyEl.getAttribute('data-note');
            keyEl.addEventListener('mousedown', () => playNote(note));
            keyEl.addEventListener('mouseup', () => stopNote(note));
            keyEl.addEventListener('mouseleave', () => stopNote(note));
        });

        // --- 自動再生 (Web Audio API のタイムラインによる正確なBPM追従) ---
        // テスト用メロディ (キラキラ星の冒頭: 拍単位で指定)
        const demoMelody = [
            { note: 'C5', beat: 0 }, { note: 'C5', beat: 1 },
            { note: 'G5', beat: 2 }, { note: 'G5', beat: 3 },
            { note: 'A5', beat: 4 }, { note: 'A5', beat: 5 },
            { note: 'G5', beat: 6 }
        ];

        let scheduledNodes = []; 
        let UIAnimationTimers = []; 

        function stopAllMusic() {
            // 1. 自動再生中の音源ノードをすべて強制ストップ
            scheduledNodes.forEach(node => {
                try { node.osc.stop(); } catch(e) {}
            });
            scheduledNodes = [];

            // 2. 画面を光らせるタイマー(setTimeout)をすべて解除
            UIAnimationTimers.forEach(t => clearTimeout(t));
            UIAnimationTimers = [];

            // 3. 手動で残っている音も消音
            Object.keys(activeNodes).forEach(note => stopNote(note));
            
            // 4. キーボードの表示を一斉クリア
            document.querySelectorAll('.key').forEach(keyEl => keyEl.classList.remove('active'));
        }

        // ▶ Playボタン
        document.getElementById('play-btn').addEventListener('click', () => {
            stopAllMusic(); 
            initAudio();

            // 入力欄のBPM値を取得して1拍の秒数を計算
            const bpm = parseFloat(document.getElementById('bpm-input').value) || 120;
            const secondsPerBeat = 60 / bpm; 

            // 再生を開始する絶対時間
            const startTime = audioCtx.currentTime + 0.05;

            demoMelody.forEach(item => {
                if (!noteFreqs[item.note]) return;

                const noteStartTime = startTime + (item.beat * secondsPerBeat);
                const noteStopTime = noteStartTime + (secondsPerBeat * 0.8); // 1拍の8割の長さ鳴らす

                // オーディオグラフの生成
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(noteFreqs[item.note], noteStartTime);

                // 正確な音量変化（アタックとリリース）の予約
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.setValueAtTime(0, noteStartTime);
                gainNode.gain.linearRampToValueAtTime(0.4, noteStartTime + 0.02); 
                gainNode.gain.setValueAtTime(0.4, noteStopTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, noteStopTime + 0.1); 

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // タイムライン上で再生を予約
                osc.start(noteStartTime);
                osc.stop(noteStopTime + 0.1);

                scheduledNodes.push({ osc, gainNode });

                // 画面の鍵盤を音と同期して光らせる処理
                const delayToSyncUI = (noteStartTime - audioCtx.currentTime) * 1000;
                const delayToStopUI = (noteStopTime - audioCtx.currentTime) * 1000;

                const keyEl = document.querySelector(`.key[data-note="${item.note}"]`);
                if (keyEl) {
                    const startTimer = setTimeout(() => {
                        keyEl.classList.add('active');
                    }, delayToSyncUI);

                    const stopTimer = setTimeout(() => {
                        keyEl.classList.remove('active');
                    }, delayToStopUI);

                    UIAnimationTimers.push(startTimer, stopTimer);
                }
            });
        });

        // ■ Stopボタン
        document.getElementById('stop-btn').addEventListener('click', () => {
            stopAllMusic();
        });
    </script>
</body>
</html>
