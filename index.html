<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Single-row Piano — A-row for Whites, W-row for Blacks</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f9;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin-bottom: 6px; font-size: 20px; }
    p { margin-top: 0; margin-bottom: 12px; font-size: 14px; color: #444; }

    .piano-wrap {
      width: 100%;
      max-width: 1100px;
      overflow-x: auto;
      border: 1px solid #ddd;
      background: linear-gradient(#fff, #fbfbfd);
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border-radius: 6px;
    }

    .piano {
      position: relative;
      height: 160px;
      display: flex;
      align-items: flex-end;
      user-select: none;
    }

    .key {
      position: relative;
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      box-sizing: border-box;
      border: 1px solid #bbb;
      background: linear-gradient(#fff, #eee);
      height: 160px;
      width: 56px;
      margin-right: -1px;
      cursor: pointer;
      border-radius: 4px 4px 6px 6px;
      flex: 0 0 auto;
    }
    .key:last-child { margin-right: 0; }

    .key-label {
      font-size: 12px;
      padding: 6px 4px;
      color: #222;
      text-align: center;
      width: 100%;
      background: rgba(255,255,255,0.3);
      border-radius: 0 0 6px 6px;
    }

    .black {
      position: absolute;
      height: 100px;
      width: 36px;
      background: linear-gradient(#111, #222);
      color: #fff;
      border-radius: 4px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.4);
      z-index: 2;
      transform: translateX(50%);
      margin-left: -18px;
      border: 1px solid #000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
    }
    .black .key-label { font-size: 11px; padding: 6px 2px; color: #fff; background: transparent; }

    .key.active {
      background: linear-gradient(#e6f2ff, #d9ecff);
      transform: translateY(2px);
      box-shadow: inset 0 0 0 2px rgba(0,100,200,0.08);
    }
    .black.active {
      background: linear-gradient(#0050a0, #003c82);
      transform: translateY(4px);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.03);
    }

    .help { font-size: 13px; color: #555; margin-top: 10px; }

    @media (max-width: 600px) {
      .key { width: 44px; height: 120px; }
      .black { width: 28px; height: 78px; margin-left: -14px; transform: translateX(50%); }
    }
  </style>
</head>
<body>
  <h1>Single-row Piano — A-row for Whites, W-row for Blacks</h1>
  <p>White keys: A-row (a s d f g h j k l ;) — Black keys: W-row (w e t y u o p [ ). Click or press keys to play.</p>

  <div class="piano-wrap">
    <div id="piano" class="piano" tabindex="0" aria-label="Piano keyboard"></div>
  </div>

  <div class="help">Click to focus, then use the keyboard. Example: a s d f g h j k l ; for whites, w e t y u o p [ for blacks.</div>

  <script>
    (function(){
      function freqFromNote(midi) {
        return 440 * Math.pow(2, (midi - 69) / 12);
      }
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      function playTone(frequency, duration = 1.2) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc2.type = 'sawtooth';
        osc.frequency.value = frequency;
        osc2.frequency.value = frequency * 2;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.9, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 6000;
        osc.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc2.start(now);
        osc.stop(now + duration + 0.02);
        osc2.stop(now + duration + 0.02);
      }

      const startMidi = 60; // C4
      const endMidi = 83;   // B5
      const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const keyOrder = [];
      for (let m = startMidi; m <= endMidi; m++) {
        const name = noteNames[m % 12];
        const isBlack = name.includes('#');
        keyOrder.push({ midi: m, name: name + Math.floor(m/12), isBlack });
      }

      // Define A-row (white) and W-row (black) arrays.
      const aRow = ['a','s','d','f','g','h','j','k','l',';','\'','\\']; // more than needed but safe
      const wRow = ['w','e','t','y','u','o','p','[',']','/']; // black keys mapping order

      // Build a mapping left-to-right. For each key in keyOrder, if white assign next from aRow,
      // if black assign next from wRow. If rows run out, leave unmapped.
      let ai = 0, wi = 0;
      keyOrder.forEach(k => {
        if (k.isBlack) {
          k.keyChar = (wi < wRow.length) ? wRow[wi++] : '';
        } else {
          k.keyChar = (ai < aRow.length) ? aRow[ai++] : '';
        }
      });

      const piano = document.getElementById('piano');
      piano.innerHTML = '';
      const whiteKeys = [];
      const keyElements = {};

      keyOrder.forEach((k) => {
        if (!k.isBlack) {
          const div = document.createElement('div');
          div.className = 'key';
          div.dataset.midi = k.midi;
          div.dataset.note = k.name;
          div.dataset.kb = k.keyChar || '';
          div.tabIndex = 0;
          const label = document.createElement('div');
          label.className = 'key-label';
          label.innerText = (k.keyChar ? k.keyChar.toUpperCase() + ' • ' : '') + k.name;
          div.appendChild(label);
          piano.appendChild(div);
          whiteKeys.push({k, el: div});
          if (k.keyChar) keyElements[k.keyChar.toLowerCase()] = {el: div, midi: k.midi};
        }
      });

      keyOrder.forEach((k, idx) => {
        if (k.isBlack) {
          const whitesBefore = keyOrder.slice(0, idx).filter(x => !x.isBlack).length;
          const attachWhite = whiteKeys[whitesBefore - 1];
          if (!attachWhite) return;
          const black = document.createElement('div');
          black.className = 'key black';
          black.dataset.midi = k.midi;
          black.dataset.note = k.name;
          black.dataset.kb = k.keyChar || '';
          const label = document.createElement('div');
          label.className = 'key-label';
          label.innerText = (k.keyChar ? k.keyChar.toUpperCase() + ' • ' : '') + k.name;
          black.appendChild(label);
          piano.appendChild(black);
          if (k.keyChar) keyElements[k.keyChar.toLowerCase()] = {el: black, midi: k.midi};
        }
      });

      function positionBlackKeys() {
        const allWhiteEls = Array.from(piano.querySelectorAll('.key:not(.black)'));
        const blackEls = Array.from(piano.querySelectorAll('.black'));
        blackEls.forEach(black => {
          const midi = parseInt(black.dataset.midi,10);
          const idx = keyOrder.findIndex(x => x.midi === midi);
          const whitesBefore = keyOrder.slice(0, idx).filter(x => !x.isBlack).length;
          const leftWhiteEl = allWhiteEls[whitesBefore - 1];
          if (!leftWhiteEl) return;
          const left = leftWhiteEl.offsetLeft + leftWhiteEl.offsetWidth;
          const blackWidth = black.offsetWidth;
          black.style.left = (left - blackWidth / 2) + 'px';
        });
      }
      window.addEventListener('resize', positionBlackKeys);
      setTimeout(positionBlackKeys, 50);

      const activeKeys = {};
      function noteOn(midi) {
        const frequency = freqFromNote(midi);
        playTone(frequency, 1.2);
        const els = Array.from(piano.querySelectorAll('[data-midi="' + midi + '"]'));
        els.forEach(el => el.classList.add('active'));
        if (activeKeys[midi]) clearTimeout(activeKeys[midi]);
        activeKeys[midi] = setTimeout(() => {
          els.forEach(el => el.classList.remove('active'));
          delete activeKeys[midi];
        }, 420);
      }

      piano.addEventListener('pointerdown', (ev) => {
        const key = ev.target.closest('.key');
        if (!key) return;
        const midi = parseInt(key.dataset.midi,10);
        if (audioCtx.state === 'suspended') audioCtx.resume();
        noteOn(midi);
      });

      const pressed = {};
      window.addEventListener('keydown', (ev) => {
        if (ev.repeat) return;
        // don't capture if typing in input-like element
        const tag = (ev.target && ev.target.tagName) || '';
        if (tag === 'INPUT' || tag === 'TEXTAREA' || ev.target.isContentEditable) return;
        const k = ev.key.toLowerCase();
        if (!k) return;
        const mapped = keyElements[k];
        if (mapped) {
          ev.preventDefault();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          if (pressed[k]) return;
          pressed[k] = true;
          noteOn(mapped.midi);
        }
      });
      window.addEventListener('keyup', (ev) => {
        const k = ev.key.toLowerCase();
        if (!k) return;
        if (pressed[k]) delete pressed[k];
      });

      piano.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
      });

      // For debugging, you can open console to see mapping:
      // console.log('Mapping:', keyOrder.map(k=>({note:k.name,key:k.keyChar})));
    })();
  </script>
</body>
</html>
